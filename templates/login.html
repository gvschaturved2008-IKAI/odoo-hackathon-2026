<!DOCTYPE html>
<html>
<head>
    <title>AssetFlow Login</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>AssetFlow Login</h2>

    <form method="post">
        <input type="text" name="name" placeholder="Your Name" required>

        <select name="role">
            <option value="Admin">Admin</option>
            <option value="Manager">Manager</option>
            <option value="Employee">Employee</option>
        </select>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
